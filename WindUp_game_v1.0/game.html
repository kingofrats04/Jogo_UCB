<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wind Up</title>

    <script src="js/main.js"></script>

    <!-- CSS local -->
    <link rel="stylesheet" href="css/stylesGame.css" />

    <!-- CSS animate -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

    <!-- Ícones -->
    <script src="https://use.fontawesome.com/releases/v6.1.0/js/all.js" crossorigin="anonymous"></script>
</head>

<body id="page-game">

    <div id="container">
        <div>
            <div class="social-icons fixed-top">
                <a href="/public/index.html" class="btn btn-dark m-3"><i class="fa fa-arrow-circle-left"
                        aria-hidden="true"></i></a>
            </div>

            <element class="try-again fixed-top">
                <a href="">Try again</a>
            </element>

            <br><br><br>
        </div>
    </div>

    <br>
    <br>

    <div id="container">
        <div id="jogo">

            <header>
                <h1 class="titulo">Wind Up</h1>
            </header>

            <div id="tabuleiro-container">
                <div id="tabuleiro">

                </div>
            </div>

            <br>

            <div id="container-teclado">
                <div class="linha-teclado">
                    <button data-key="q">q</button>
                    <button data-key="w">w</button>
                    <button data-key="e">e</button>
                    <button data-key="r">r</button>
                    <button data-key="t">t</button>
                    <button data-key="y">y</button>
                    <button data-key="u">u</button>
                    <button data-key="i">i</button>
                    <button data-key="o">o</button>
                    <button data-key="p">p</button>
                </div>
                <div class="linha-teclado">
                    <div class="espacador-medio"></div>
                    <button data-key="a">a</button>
                    <button data-key="s">s</button>
                    <button data-key="d">d</button>
                    <button data-key="f">f</button>
                    <button data-key="g">g</button>
                    <button data-key="h">h</button>
                    <button data-key="j">j</button>
                    <button data-key="k">k</button>
                    <button data-key="l">l</button>
                    <div class="espacador-medio"></div>
                </div>
                <div class="linha-teclado">
                    <button data-key="enter" class="botao-maior">Enter</button>
                    <button data-key="z">z</button>
                    <button data-key="x">x</button>
                    <button data-key="c">c</button>
                    <button data-key="v">v</button>
                    <button data-key="b">b</button>
                    <button data-key="n">n</button>
                    <button data-key="m">m</button>
                    <button data-key="del" class="botao-maior">Del</button>
                </div>
            </div>
        </div>
    </div>

    <div id="snackbar"></div>
</body>

</html>
